<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Avoid Obstacles | Arcade Hub</title>
<style>
body { background:#0b1223; color:#e8f1ff; font-family:Arial,Helvetica,sans-serif; margin:12px; }
#gameArea { width:100%; min-height:340px; max-width:740px; margin:auto; background:#060f25; border:1px solid #2c3a6b; border-radius:10px; padding:8px; position:relative; }
#gameTitle { font-size:1.4rem; margin-bottom:0.2rem; }
#gameInfo { margin-bottom:0.6rem; }
#controls { margin-top:10px; }
button { background:#7f52ff; color:#fff; border:none; border-radius:7px; padding:8px 12px; cursor:pointer; }
button:hover { background:#a571ff; }
</style>
</head>
<body>
<h1 id='gameTitle'>ðŸ§± Avoid Obstacles</h1>
<div id='gameInfo'>Dodge falling blocks for points.</div>
<div id='gameArea'></div>
<div id='scorePanel'>Score: <span id='scoreDisplay'>0</span> | Best: <span id='bestScore'>0</span></div>
<div id='controls'><button id='backButton'>Back to Arcade Hub</button></div>
<script src='../game-engines.js'></script>
<script>
const thisGame = { id: 'falling-obstacles', title: 'Avoid Obstacles', engine: 'avoidFalling', desc: 'Dodge falling blocks for points.' };
const backButton = document.getElementById('backButton');
if (backButton) {
  backButton.addEventListener('click', () => {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'closeModal' }, '*');
    } else {
      history.back();
    }
  });
}
window.onload = function() { initSharedGamePage(thisGame); };
</script>
</body>
</html>
